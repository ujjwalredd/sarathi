name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Stdlib only, by design: a benchmark that is hard to install is a
      # benchmark nobody re-runs.
      - name: Run tests
        run: python -m unittest discover bench -v

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check repo invariants
        run: python bench/validate.py

  claude-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pinned Claude Code CLI
        run: npm install --global @anthropic-ai/claude-code@2.1.206
      - name: Validate plugin manifests
        run: claude plugin validate --strict .
      - name: Smoke-test local marketplace install
        env:
          CLAUDE_CONFIG_DIR: ${{ runner.temp }}/claude-clean
        run: |
          make install
          claude plugin details sarathi@sarathi | tee "${RUNNER_TEMP}/sarathi-plugin.txt"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          expected = json.loads(Path(".claude-plugin/plugin.json").read_text())["version"]
          details = (Path(os.environ["RUNNER_TEMP"]) / "sarathi-plugin.txt").read_text()
          assert f"sarathi {expected}" in details, details
          assert "Skills (1)  sarathi" in details, details
          PY

  codex-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pinned Codex CLI
        run: npm install --global @openai/codex@0.142.3
      - name: Smoke-test Codex marketplace install
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-clean
        run: |
          mkdir -p "${CODEX_HOME}"
          codex plugin marketplace add . --json
          codex plugin add sarathi@sarathi --json
          codex plugin list --json | tee "${RUNNER_TEMP}/sarathi-codex-plugin.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          expected = json.loads(Path(".codex-plugin/plugin.json").read_text())["version"]
          payload = json.loads(
              (Path(os.environ["RUNNER_TEMP"]) / "sarathi-codex-plugin.json").read_text()
          )
          installed = [
              plugin for plugin in payload["installed"]
              if plugin.get("name") == "sarathi"
          ]
          assert len(installed) == 1, payload
          assert installed[0]["version"] == expected, installed[0]
          assert installed[0]["installed"] is True, installed[0]
          assert installed[0]["enabled"] is True, installed[0]
          PY

  reproducible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Generated arms are intentionally not committed. Build twice to prove
      # deterministic reproduction from tracked source files.
      - name: Arms regenerate deterministically
        run: |
          python bench/build_arms.py --out /tmp/sarathi-arms-a
          python bench/build_arms.py --out /tmp/sarathi-arms-b
          diff -ru /tmp/sarathi-arms-a /tmp/sarathi-arms-b
